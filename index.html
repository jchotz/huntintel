<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HuntIntel — Hunting Regulations by State & Species</title>
  <meta name="description" content="Easy reference for hunting season dates, bag limits, and license costs by state and species.">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link href="https://api.fontshare.com/v2/css?f[]=clash-display@400,500,600,700&f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-bg:              #f5f2ec;
      --color-surface:         #f9f7f2;
      --color-surface-2:       #fdfcfa;
      --color-surface-offset:  #ede9e0;
      --color-divider:         #d8d3c8;
      --color-border:          #ccc7bb;
      --color-text:             #231f15;
      --color-text-muted:       #6b6758;
      --color-text-faint:       #b0ac9f;
      --color-text-inverse:     #f9f7f1;
      --color-primary:           #b85c00;
      --color-primary-hover:     #963d00;
      --color-primary-highlight: #f0dece;
      --color-success:           #3d6b1e;
      --color-success-highlight: #d4e5c8;
      --shadow-sm: 0 1px 3px rgba(35,31,21,0.07);
      --shadow-md: 0 4px 16px rgba(35,31,21,0.10);
      --radius-sm:   0.375rem;
      --radius-md:   0.5rem;
      --radius-lg:   0.75rem;
      --radius-xl:   1rem;
      --radius-2xl:  1.5rem;
      --radius-full: 9999px;
      --space-1: 0.25rem; --space-2: 0.5rem;  --space-3: 0.75rem;
      --space-4: 1rem;    --space-5: 1.25rem; --space-6: 1.5rem;
      --space-8: 2rem;    --space-10: 2.5rem; --space-12: 3rem;
      --space-16: 4rem;
      --text-xs:   clamp(0.75rem, 0.7rem + 0.25vw, 0.875rem);
      --text-sm:   clamp(0.875rem, 0.8rem + 0.35vw, 1rem);
      --text-base: clamp(1rem, 0.95rem + 0.25vw, 1.125rem);
      --text-lg:   clamp(1.125rem, 1rem + 0.75vw, 1.5rem);
      --text-xl:   clamp(1.5rem, 1.2rem + 1.25vw, 2.25rem);
      --font-display: 'Clash Display', 'Helvetica Neue', sans-serif;
      --font-body:    'Satoshi', 'Inter', sans-serif;
      --transition: 180ms cubic-bezier(0.16, 1, 0.3, 1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-body);
      background: var(--color-bg);
      color: var(--color-text);
      line-height: 1.5;
      min-height: 100vh;
    }
    .container { max-width: 960px; margin: 0 auto; padding: 0 var(--space-5); }

    /* ── Header ── */
    header {
      padding: var(--space-12) 0 var(--space-8);
      text-align: center;
      border-bottom: 1px solid var(--color-divider);
    }
    header h1 {
      font-family: var(--font-display);
      font-size: var(--text-xl);
      font-weight: 600;
      letter-spacing: -0.02em;
    }
    header p {
      color: var(--color-text-muted);
      font-size: var(--text-sm);
      max-width: 560px;
      margin: var(--space-3) auto 0;
    }
    .meta-row {
      display: flex;
      justify-content: center;
      gap: var(--space-3);
      margin-top: var(--space-5);
      flex-wrap: wrap;
    }
    .meta-badge {
      display: inline-block;
      padding: var(--space-1) var(--space-3);
      border-radius: var(--radius-full);
      background: var(--color-primary-highlight);
      color: var(--color-primary);
      font-size: var(--text-xs);
      font-weight: 700;
    }

    /* ── Controls bar ── */
    .controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-4);
      padding: var(--space-5) 0 var(--space-4);
      flex-wrap: wrap;
    }
    .controls-left {
      display: flex;
      align-items: center;
      gap: var(--space-3);
    }
    .controls h2 {
      font-family: var(--font-display);
      font-size: var(--text-base);
      font-weight: 600;
    }
    .search-input {
      padding: var(--space-2) var(--space-4);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      background: var(--color-surface);
      color: var(--color-text);
      font-size: var(--text-sm);
      font-family: var(--font-body);
      width: 200px;
      transition: border-color var(--transition);
    }
    .search-input:focus { outline: none; border-color: var(--color-primary); box-shadow: 0 0 0 3px var(--color-primary-highlight); }
    .state-count { font-size: var(--text-xs); color: var(--color-text-faint); }

    /* ── List view ── */
    .state-list {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0 var(--space-1);
    }
    .state-list thead th {
      text-align: left;
      padding: var(--space-2) var(--space-4);
      font-size: var(--text-xs);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--color-text-faint);
      border-bottom: 1px solid var(--color-divider);
      position: sticky;
      top: 0;
      background: var(--color-bg);
      z-index: 1;
    }
    .state-row td {
      padding: var(--space-3) var(--space-4);
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      vertical-align: middle;
      transition: background var(--transition);
      cursor: pointer;
    }
    .state-row td:first-child {
      border-radius: var(--radius-xl) 0 0 var(--radius-xl);
      border-right: none;
    }
    .state-row td:last-child {
      border-radius: 0 var(--radius-xl) var(--radius-xl) 0;
      border-left: none;
    }
    .state-row:hover td { background: var(--color-surface-offset); }

    /* State name cell */
    .cell-name { min-width: 160px; }
    .cell-name .state-abbr {
      font-family: var(--font-display);
      font-size: var(--text-lg);
      font-weight: 700;
      color: var(--color-primary);
      letter-spacing: -0.03em;
      margin-right: var(--space-3);
    }
    .state-name { font-weight: 600; font-size: var(--text-sm); }

    /* Category select */
    .cell-select { width: 220px; }
    .select-wrap { position: relative; }
    .cat-select {
      width: 100%;
      padding: var(--space-2) var(--space-8) var(--space-2) var(--space-3);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      background: var(--color-surface-2);
      color: var(--color-text);
      font-size: var(--text-xs);
      font-family: var(--font-body);
      appearance: none;
      cursor: pointer;
      transition: border-color var(--transition);
    }
    .cat-select:hover { border-color: var(--color-text-faint); }
    .cat-select:focus { outline: none; border-color: var(--color-primary); box-shadow: 0 0 0 2px var(--color-primary-highlight); }
    .select-arrow {
      position: absolute;
      right: var(--space-2);
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
      color: var(--color-text-faint);
    }

    /* View button */
    .cell-action { width: 80px; text-align: center; }
    .view-btn {
      display: inline-flex;
      align-items: center;
      gap: var(--space-1);
      padding: var(--space-2) var(--space-3);
      border-radius: var(--radius-md);
      border: none;
      background: var(--color-primary);
      color: var(--color-text-inverse);
      font-size: var(--text-xs);
      font-weight: 600;
      font-family: var(--font-body);
      cursor: pointer;
      transition: background var(--transition);
    }
    .view-btn:hover { background: var(--color-primary-hover); }

    /* ── Drawer (copied from main site) ── */
    .drawer-overlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.45);
      backdrop-filter: blur(3px);
      opacity: 0; pointer-events: none;
      transition: opacity 250ms ease;
    }
    .drawer-overlay.open { opacity: 1; pointer-events: auto; }
    .drawer {
      position: fixed; top: 0; right: 0; z-index: 201;
      width: 540px; max-width: 100vw; height: 100dvh;
      background: var(--color-bg);
      box-shadow: var(--shadow-lg);
      transform: translateX(100%);
      transition: transform 350ms cubic-bezier(0.16, 1, 0.3, 1);
      display: flex; flex-direction: column;
    }
    .drawer.open { transform: translateX(0); }
    .drawer-head {
      display: flex; justify-content: space-between; align-items: flex-start;
      padding: var(--space-5) var(--space-6);
      border-bottom: 1px solid var(--color-divider);
      flex-shrink: 0;
    }
    .drawer-state-label {
      font-size: var(--text-xs); font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--color-primary);
    }
    .drawer-title { font-family: var(--font-display); font-size: var(--text-lg); font-weight: 600; margin-top: var(--space-1); }
    .drawer-source { font-size: var(--text-xs); color: var(--color-text-muted); margin-top: var(--space-1); word-break: break-all; }
    .drawer-close {
      background: none; border: none; color: var(--color-text-muted);
      cursor: pointer; padding: var(--space-1); border-radius: var(--radius-sm);
      transition: background var(--transition), color var(--transition);
    }
    .drawer-close:hover { background: var(--color-surface-offset); color: var(--color-text); }
    .drawer-body { padding: var(--space-6); overflow-y: auto; flex: 1; }

    /* Spinner */
    .spinner { text-align: center; padding: var(--space-8); color: var(--color-text-faint); }
    .spinner::after {
      content: ''; display: inline-block; width: 24px; height: 24px;
      border: 3px solid var(--color-border); border-top-color: var(--color-primary);
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .state-list,
      .state-list thead,
      .state-list tbody,
      .state-row,
      .state-row td { display: block; }
      .state-list thead { display: none; }
      .state-row td {
        border: none;
        padding: var(--space-2) var(--space-4);
        border-radius: 0 !important;
      }
      .state-row td:first-child {
        border-top: 1px solid var(--color-border);
        border-radius: var(--radius-xl) var(--radius-xl) 0 0 !important;
        padding-top: var(--space-3);
      }
      .state-row td:last-child {
        border-bottom: 1px solid var(--color-border);
        border-radius: 0 0 var(--radius-xl) var(--radius-xl) !important;
        padding-bottom: var(--space-3);
      }
      .cell-name, .cell-select, .cell-action {
        width: auto;
        text-align: left;
      }
      .cell-select { width: 100%; }
      .cell-action { text-align: left; }
      .search-input { width: 140px; }
      .drawer { width: 100vw; }
    }
  </style>
</head>
<body>

<header>
  <div class="container">
    <h1>HuntIntel</h1>
    <p>Season dates, bag limits &amp; license costs for upland game birds and migratory birds.</p>
    <div class="meta-row" id="meta-row"></div>
  </div>
</header>

<main>
  <div class="container">
    <div class="controls">
      <div class="controls-left">
        <h2>States</h2>
        <span class="state-count" id="state-count"></span>
      </div>
      <input class="search-input" id="search-input" type="search" placeholder="Search states…" aria-label="Filter states">
    </div>

    <table class="state-list" id="state-list">
      <thead>
        <tr>
          <th scope="col">Name</th>
          <th scope="col">Category</th>
          <th scope="col"></th>
        </tr>
      </thead>
      <tbody id="states-tbody">
        <tr><td colspan="3" style="padding:var(--space-8);text-align:center;"><div class="spinner"></div></td></tr>
      </tbody>
    </table>
  </div>
</main>

<!-- Detail Drawer -->
<div class="drawer-overlay" id="drawer-overlay" role="presentation"></div>
<aside class="drawer" id="drawer" role="dialog" aria-modal="true" aria-labelledby="drawer-title">
  <div class="drawer-head">
    <div>
      <div class="drawer-state-label" id="drawer-state-label"></div>
      <h2 class="drawer-title" id="drawer-title"></h2>
      <p class="drawer-source" id="drawer-source"></p>
    </div>
    <button class="drawer-close" id="drawer-close" aria-label="Close panel">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
  </div>
  <div class="drawer-body" id="drawer-body"></div>
</aside>

<footer style="padding:var(--space-10) 0;text-align:center;color:var(--color-text-faint);font-size:var(--text-xs);border-top:1px solid var(--color-divider);margin-top:var(--space-10);">
  <div class="container">HuntIntel — data sourced directly from official state fish &amp; wildlife agencies. This is a site.</div>
</footer>

<script>
(function () {
  'use strict';

  function esc(s) { return String(s).replace(/[&<>"']/g, function (m) {
    return { '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[m]; });
  }

  async function loadJSON(url) {
    const r = await fetch(url);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    return r.json();
  }

  let allStates = [];

  function buildRow(state) {
    const tr = document.createElement('tr');
    tr.className = 'state-row';

    const catOptions = state.categories.map(c =>
      `<option value="${esc(c.id)}">${esc(c.label)}</option>`
    ).join('');

    tr.innerHTML = `
      <td class="cell-name">
        <span class="state-abbr">${esc(state.id)}</span>
        <span class="state-name">${esc(state.name)}</span>
      </td>
      <td class="cell-select">
        <div class="select-wrap">
          <select class="cat-select" id="list-select-${esc(state.id)}" aria-label="Select category for ${esc(state.name)}">
            ${catOptions}
          </select>
          <span class="select-arrow" aria-hidden="true">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
          </span>
        </div>
      </td>
      <td class="cell-action">
        <button class="view-btn" data-view>
          View
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </button>
      </td>
    `;

    tr.querySelector('[data-view]').addEventListener('click', (e) => {
      e.stopPropagation();
      const sel = tr.querySelector('.cat-select');
      const catId = sel.value;
      const cat = state.categories.find(c => c.id === catId);
      if (cat) showDetail(state.name, state.id, cat);
    });

    // Clicking the row also opens (uses selected category)
    tr.addEventListener('click', () => {
      const sel = tr.querySelector('.cat-select');
      const catId = sel.value;
      const cat = state.categories.find(c => c.id === catId);
      if (cat) showDetail(state.name, state.id, cat);
    });

    return tr;
  }

  function render(rows) {
    const tbody = document.getElementById('states-tbody');
    tbody.innerHTML = '';
    rows.forEach(s => tbody.appendChild(buildRow(s)));
    document.getElementById('state-count').textContent =
      `${rows.length} state${rows.length !== 1 ? 's' : ''}`;
  }

  // ── Detail drawer (adapted from main site) ──
  async function showDetail(stateName, stateId, category) {
    const overlay = document.getElementById('drawer-overlay');
    const drawer  = document.getElementById('drawer');
    const label   = document.getElementById('drawer-state-label');
    const title   = document.getElementById('drawer-title');
    const source  = document.getElementById('drawer-source');
    const body    = document.getElementById('drawer-body');

    label.textContent = stateName;
    title.textContent = category.label;
    source.textContent = 'Loading…';
    body.innerHTML = '<div class="spinner"></div>';
    overlay.classList.add('open');
    drawer.classList.add('open');
    document.body.style.overflow = 'hidden';

    try {
      const data = await loadJSON(category.dataFile);
      const s = data.source;
      source.textContent = s.page_label || s.page_url || '';
      renderDetail(body, data);
    } catch (err) {
      source.textContent = 'Failed to load data';
      body.innerHTML = `<p style="color:var(--color-text-muted)">Error: ${esc(err.message)}</p>`;
    }
  }

  function renderDetail(body, data) {
    const now = new Date();
    const speciesHtml = data.species.map(sp => {
      const start = new Date(sp.season_start);
      const end = new Date(sp.season_end);
      const active = now >= start && now <= end;
      const subs = (sp.sub_seasons || []).map(sub => `
        <div class="sub-row">
          <span class="sub-name">${esc(sub.name)}</span>
          <span class="sub-date">${esc(sub.season_start)} – ${esc(sub.season_end)}</span>
          <span class="sub-bag">${esc(sub.bag_limit || '')}</span>
        </div>
      `).join('');

      return `
        <div class="sp-item ${active ? 'sp-active' : ''}" style="border:1px solid var(--color-border);border-radius:var(--radius-xl);padding:var(--space-4);margin-bottom:var(--space-3);background:var(--color-surface);${active ? 'border-left:4px solid var(--color-success);' : ''}">
          <div style="display:flex;align-items:center;justify-content:space-between;gap:var(--space-2);flex-wrap:wrap;">
            <div>
              <strong style="font-size:var(--text-sm);">${esc(sp.name)}</strong>
              ${sp.asterisk ? '<span style="color:var(--color-primary);font-size:var(--text-xs);">*</span>' : ''}
              ${active ? '<span style="display:inline-block;padding:var(--space-1) var(--space-2);border-radius:var(--radius-full);background:var(--color-success-highlight);color:var(--color-success);font-size:var(--text-xs);font-weight:700;margin-left:var(--space-2);">Active</span>' : ''}
            </div>
          </div>
          <div style="margin-top:var(--space-2);display:grid;grid-template-columns:1fr 1fr;gap:var(--space-2);font-size:var(--text-xs);">
            <span><strong>Season:</strong> ${esc(sp.season_start)} – ${esc(sp.season_end)}</span>
            <span><strong>Bag:</strong> ${esc(sp.bag_limit || '—')}</span>
            <span><strong>Possession:</strong> ${esc(sp.possession_limit || '—')}</span>
            <span><strong>Area:</strong> ${esc(sp.hunting_units || 'Statewide')}</span>
          </div>
          ${subs ? '<div style="margin-top:var(--space-2);padding-left:var(--space-3);border-left:2px solid var(--color-divider);">' + subs + '</div>' : ''}
        </div>`;
    }).join('');

    const licHtml = data.licenses.map(l => `
      <div style="border-bottom:1px solid var(--color-divider);padding:var(--space-3) 0;font-size:var(--text-xs);display:flex;justify-content:space-between;align-items:flex-start;gap:var(--space-2);">
        <div>
          <strong>${esc(l.name)}</strong>${l.asterisk ? '<span style="color:var(--color-primary);">*</span>' : ''}
          ${l.covers ? '<br><span style="color:var(--color-text-muted);font-size:var(--text-xs);">' + esc(l.covers) + '</span>' : ''}
        </div>
        <div style="text-align:right;flex-shrink:0;">
          ${l.resident_cost ? '<div><span style="color:var(--color-text-faint);">Res:</span> ' + esc(l.resident_cost) + '</div>' : ''}
          ${l.nonresident_cost ? '<div><span style="color:var(--color-text-faint);">Nonres:</span> ' + esc(l.nonresident_cost) + '</div>' : ''}
        </div>
      </div>
    `).join('');

    const notesHtml = data.key_notes.map(n => `
      <div style="border-left:3px solid var(--color-primary-highlight);padding:var(--space-3) var(--space-4);margin-bottom:var(--space-3);background:var(--color-surface-offset);border-radius:var(--radius-lg);font-size:var(--text-xs);">
        <p>${esc(n.title)}</p>
        ${n.sources ? n.sources.map(s => `<p style="margin-top:var(--space-1);color:var(--color-text-muted);font-size:var(--text-xs);">Source: <a href="${esc(s.url)}" target="_blank" rel="noopener" style="color:var(--color-primary);">${esc(s.label)}</a></p>`).join('') : ''}
      </div>
    `).join('');

    body.innerHTML = `
      <div style="margin-bottom:var(--space-6);">
        <h3 style="font-family:var(--font-display);font-size:var(--text-sm);font-weight:600;margin-bottom:var(--space-3);text-transform:uppercase;letter-spacing:0.08em;color:var(--color-text-faint);">Species &amp; Seasons</h3>
        ${data.species.length ? speciesHtml : '<p style="color:var(--color-text-muted);font-size:var(--text-sm);">No species data available.</p>'}
      </div>
      <div style="margin-bottom:var(--space-6);">
        <h3 style="font-family:var(--font-display);font-size:var(--text-sm);font-weight:600;margin-bottom:var(--space-3);text-transform:uppercase;letter-spacing:0.08em;color:var(--color-text-faint);">Licenses &amp; Fees</h3>
        ${data.licenses.length ? licHtml : '<p style="color:var(--color-text-muted);font-size:var(--text-sm);">No license data available.</p>'}
        ${data.licenses.some(l => l.asterisk) ? '<p style="font-size:var(--text-xs);color:var(--color-text-faint);margin-top:var(--space-2);"><span style="color:var(--color-primary);">*</span> Additional requirements may apply</p>' : ''}
      </div>
      <div>
        <h3 style="font-family:var(--font-display);font-size:var(--text-sm);font-weight:600;margin-bottom:var(--space-3);text-transform:uppercase;letter-spacing:0.08em;color:var(--color-text-faint);">Key Notes</h3>
        ${data.key_notes.length ? notesHtml : '<p style="color:var(--color-text-muted);font-size:var(--text-sm);">No key notes available.</p>'}
      </div>
    `;
  }

  function closeDrawer() {
    document.getElementById('drawer-overlay').classList.remove('open');
    document.getElementById('drawer').classList.remove('open');
    document.body.style.overflow = '';
  }
  document.getElementById('drawer-close').addEventListener('click', closeDrawer);
  document.getElementById('drawer-overlay').addEventListener('click', closeDrawer);
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDrawer(); });

  // ── Search / filter ──
  const searchInput = document.getElementById('search-input');
  searchInput.addEventListener('input', () => {
    const q = searchInput.value.toLowerCase().trim();
    const filtered = allStates.filter(s =>
      s.name.toLowerCase().includes(q) ||
      s.id.toLowerCase().includes(q)
    );
    render(filtered);
  });

  // ── Bootstrap ──
  async function init() {
    const tbody = document.getElementById('states-tbody');
    try {
      const manifest = await loadJSON('data/states.json');
      allStates = manifest.states || [];
      render(allStates);

      const totalCats = allStates.reduce((n, s) => n + s.categories.length, 0);
      document.getElementById('meta-row').innerHTML = `
        <span class="meta-badge"><strong>${allStates.length}</strong> states</span>
        <span class="meta-badge"><strong>${totalCats}</strong> categories</span>
        <span class="meta-badge">More added on request</span>
      `;
    } catch (err) {
      tbody.innerHTML = `<tr><td colspan="3" style="padding:var(--space-8);text-align:center;color:var(--color-text-muted);">Failed to load states: ${esc(err.message)}</td></tr>`;
    }
  }

  init();
})();
</script>

<style>.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border-width:0}</style>
<script data-pplx-inline-edit>
(function () {
  if (window === window.top) return;

  const allowedParentOrigins = ["https://www.perplexity.ai","https://perplexity.ai","https://testing.perplexity.ai","https://staging.perplexity.ai","https://*.preview.i.perplexity.ai","http://localhost:3000","http://127.0.0.1:3000","http://localhost:5173","http://127.0.0.1:5173"];
  const MAX_FONT_BYTES = 500 * 1024;
  const MAX_TOTAL_FONT_BYTES = 2 * 1024 * 1024;
  let scrollForwarding = false;
  let scrollRaf = 0;
  let trustedTopOrigin = null;

  // Allow entries like "https://*.preview.i.perplexity.ai" — the wildcard
  // matches a single DNS label (no dots), so "https://*.foo" cannot stretch
  // across multiple labels.
  function matchesAllowedOrigin(origin) {
    if (!origin) return false;
    for (const entry of allowedParentOrigins) {
      if (!entry.includes("*")) {
        if (entry === origin) return true;
        continue;
      }
      const pattern = new RegExp(
        "^" +
          entry.replace(/[.+?^${}()|[\]\\]/g, "\\$&").replace(/\*/g, "[^.]+") +
          "$",
      );
      if (pattern.test(origin)) return true;
    }
    return false;
  }

  // Trust decision: when the sender is same-origin-visible (event.origin is a
  // real origin like https://www.perplexity.ai) we trust event.origin directly.
  // When event.origin is "null" (opaque broker srcdoc), we fall back to the
  // broker's stamped `parentOrigin` to identify the top window. The fallback
  // is claim-only — we rely on the browser's native `targetOrigin` enforcement
  // on the response path (see postToTrustedTop) to ensure replies can't be
  // delivered to anyone but the actual top window of that claimed origin.
  function getTrustedParentOrigin(event) {
    const forwardedParentOrigin =
      typeof event.data.parentOrigin === "string" ? event.data.parentOrigin : null;
    const parentOrigin = event.origin === "null" ? forwardedParentOrigin : event.origin;
    return matchesAllowedOrigin(parentOrigin) ? parentOrigin : null;
  }

  // All responses go to window.top with targetOrigin = the allowlisted origin.
  // An attacker that iframes us inside their own null-origin broker can claim
  // any parentOrigin they like, but the browser will drop the reply whenever
  // the real top's origin doesn't match — so the screenshot never leaves.
  function postToTrustedTop(message) {
    if (!trustedTopOrigin) return;
    try {
      window.top.postMessage(message, trustedTopOrigin);
    } catch (_error) {}
  }

  function inlineAll(original, clone) {
    if (original.nodeType !== 1 || clone.nodeType !== 1) return;

    try {
      const computedStyle = getComputedStyle(original);
      // cssText on a computed style is the serialized declaration in modern
      // Chromium/Safari — a single read beats enumerating ~400 longhand
      // properties. Firefox returns "" here, so we fall back on empty.
      const serialized = computedStyle.cssText;
      if (serialized) {
        clone.style.cssText = serialized;
      } else {
        const parts = new Array(computedStyle.length);
        for (let index = 0; index < computedStyle.length; index += 1) {
          const property = computedStyle[index];
          parts[index] = `${property}:${computedStyle.getPropertyValue(property)};`;
        }
        clone.style.cssText = parts.join("");
      }
    } catch (_error) {}

    const originalChildren = original.children;
    const clonedChildren = clone.children;
    for (
      let index = 0;
      index < originalChildren.length && index < clonedChildren.length;
      index += 1
    ) {
      inlineAll(originalChildren[index], clonedChildren[index]);
    }
  }

  function extractFontUrl(srcValue) {
    const matches = [
      ...srcValue.matchAll(
        /url\(["']?([^"')]+)["']?\)(?:\s*format\(["']?([^"')]+)["']?\))?/gi,
      ),
    ];
    if (matches.length === 0) return null;
    const woff2 = matches.find((m) => m[2] && m[2].toLowerCase().includes("woff2"));
    if (woff2) return woff2[1];
    const woff = matches.find((m) => m[2] && m[2].toLowerCase().includes("woff"));
    if (woff) return woff[1];
    return matches[0][1];
  }

  // Cache resolved font URL -> data URI across captures. Fonts on a page
  // essentially never change, and a batch run emits multiple captures back to
  // back — without this we'd refetch + re-base64 every time.
  const fontDataUriCache = new Map();
  const SRC_DECLARATION_RE = /src\s*:\s*[^;}]+/i;

  async function fetchAsDataUri(url) {
    if (fontDataUriCache.has(url)) return fontDataUriCache.get(url);
    let dataUri = null;
    try {
      const response = await fetch(url, { mode: "cors", credentials: "omit" });
      if (response.ok) {
        const blob = await response.blob();
        if (blob.size <= MAX_FONT_BYTES) {
          dataUri = await new Promise((resolve) => {
            const reader = new FileReader();
            reader.onloadend = () =>
              resolve(typeof reader.result === "string" ? reader.result : null);
            reader.onerror = () => resolve(null);
            reader.readAsDataURL(blob);
          });
        }
      }
    } catch (_error) {
      dataUri = null;
    }
    fontDataUriCache.set(url, dataUri);
    return dataUri;
  }

  function collectFontFaceRuleTexts() {
    const rules = [];
    for (const sheet of document.styleSheets) {
      let cssRules;
      try {
        cssRules = sheet.cssRules;
      } catch (_error) {
        continue;
      }
      if (!cssRules) continue;
      for (const rule of cssRules) {
        const cssText = rule.cssText || "";
        if (cssText.startsWith("@font-face")) rules.push(cssText);
      }
    }
    return rules;
  }

  async function buildInlinedFontCss() {
    const ruleTexts = collectFontFaceRuleTexts();
    if (ruleTexts.length === 0) return null;

    const resolved = ruleTexts.map((cssText) => {
      if (!SRC_DECLARATION_RE.test(cssText)) return null;
      const srcMatch = cssText.match(/src\s*:\s*([^;}]+)[;}]/i);
      if (!srcMatch) return null;
      const url = extractFontUrl(srcMatch[1]);
      if (!url) return null;
      try {
        return { cssText, url: new URL(url, document.baseURI).href };
      } catch (_error) {
        return null;
      }
    });

    const dataUris = await Promise.all(
      resolved.map((entry) => (entry ? fetchAsDataUri(entry.url) : Promise.resolve(null))),
    );

    const inlined = [];
    let totalBytes = 0;
    for (let index = 0; index < resolved.length; index += 1) {
      const entry = resolved[index];
      const dataUri = dataUris[index];
      if (!entry || !dataUri) continue;
      const approxBytes = dataUri.length * 0.75;
      if (totalBytes + approxBytes > MAX_TOTAL_FONT_BYTES) break;
      totalBytes += approxBytes;
      inlined.push(entry.cssText.replace(SRC_DECLARATION_RE, `src: url("${dataUri}")`));
    }
    return inlined.length > 0 ? inlined.join("\n") : null;
  }

  function stripExternal(clone) {
    const images = clone.querySelectorAll("img");
    for (let index = 0; index < images.length; index += 1) {
      const src = images[index].getAttribute("src");
      if (src && !src.startsWith("data:")) images[index].removeAttribute("src");
    }

    const elements = clone.querySelectorAll("*");
    for (let index = 0; index < elements.length; index += 1) {
      const style = elements[index].style.cssText;
      if (style && style.includes("url(")) {
        elements[index].style.cssText = style.replace(
          /url\(["']?(?!data:)[^)"']*["']?\)/gi,
          "none",
        );
      }
    }
  }

  function emitScroll() {
    scrollRaf = 0;
    if (!scrollForwarding) return;
    postToTrustedTop({
      type: "INLINE_EDIT_SCROLL",
      scrollX: window.scrollX,
      scrollY: window.scrollY,
    });
  }

  window.addEventListener(
    "scroll",
    function () {
      if (!scrollForwarding || scrollRaf) return;
      scrollRaf = requestAnimationFrame(emitScroll);
    },
    { passive: true, capture: true },
  );

  async function handleCaptureRequest(event) {
    const requestId = event.data.requestId;
    const scrollX = window.scrollX;
    const scrollY = window.scrollY;
    const width = window.innerWidth;
    const height = window.innerHeight;

    function postResult(dataUrl) {
      postToTrustedTop({
        type: "INLINE_EDIT_SCREENSHOT_RESULT",
        requestId,
        dataUrl,
        scrollX,
        scrollY,
      });
    }

    try {
      // Wait for any pending web fonts to resolve so both inline metrics and
      // the @font-face inlining below see the same loaded faces.
      if (document.fonts && document.fonts.ready) {
        try {
          await document.fonts.ready;
        } catch (_error) {}
      }

      const clone = document.documentElement.cloneNode(true);
      inlineAll(document.documentElement, clone);

      const removedNodes = clone.querySelectorAll("script,link[rel=\"stylesheet\"],style");
      for (let index = 0; index < removedNodes.length; index += 1) {
        removedNodes[index].remove();
      }

      stripExternal(clone);

      // Re-embed web fonts as data-URI @font-face rules so the SVG rasterizer
      // can resolve them — external font URLs aren't fetched during
      // foreignObject rendering, which would otherwise force a fallback face
      // and change text metrics.
      const inlinedFontCss = await buildInlinedFontCss();
      if (inlinedFontCss) {
        const styleEl = document.createElement("style");
        styleEl.textContent = inlinedFontCss;
        const head = clone.querySelector("head");
        if (head) head.appendChild(styleEl);
        else clone.insertBefore(styleEl, clone.firstChild);
      }

      const html = new XMLSerializer().serializeToString(clone);
      const svg =
        `<svg xmlns="http://www.w3.org/2000/svg" width="${width}" height="${height}">` +
        '<foreignObject width="100%" height="100%">' +
        `<div xmlns="http://www.w3.org/1999/xhtml" style="width:${width}px;height:${height}px;overflow:hidden">` +
        `<div style="position:relative;left:-${scrollX}px;top:-${scrollY}px">` +
        html +
        "</div></div></foreignObject></svg>";
      const svgUrl = `data:image/svg+xml;charset=utf-8,${encodeURIComponent(svg)}`;
      const image = new Image();
      image.onload = function () {
        const canvas = document.createElement("canvas");
        canvas.width = width;
        canvas.height = height;
        canvas.getContext("2d").drawImage(image, 0, 0);
        postResult(canvas.toDataURL("image/png"));
      };
      image.onerror = function () {
        postResult(null);
      };
      image.src = svgUrl;
    } catch (_error) {
      postResult(null);
    }
  }

  window.addEventListener("message", function (event) {
    if (!event.data) return;
    // Only accept messages from the direct parent frame. Blocks sibling /
    // unrelated-window postMessage senders that could otherwise reach us.
    if (event.source !== window.parent) return;

    const trustedParentOrigin = getTrustedParentOrigin(event);
    if (!trustedParentOrigin) return;
    trustedTopOrigin = trustedParentOrigin;

    if (event.data.type === "INLINE_EDIT_SCROLL_START") {
      scrollForwarding = true;
      emitScroll();
      return;
    }

    if (event.data.type === "INLINE_EDIT_SCROLL_STOP") {
      scrollForwarding = false;
      if (scrollRaf) cancelAnimationFrame(scrollRaf);
      scrollRaf = 0;
      return;
    }

    if (event.data.type !== "INLINE_EDIT_CAPTURE_REQUEST") return;

    handleCaptureRequest(event);
  });
})();


</script>
